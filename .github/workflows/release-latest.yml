name: Release Latest

on:
  push:
    tags:
      - latest
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest --title "TradeHubMarkets" --notes "Latest TradeHub Markets release."
            gh release upload latest module.json tradehub-markets.zip --clobber
          else
            gh release create latest module.json tradehub-markets.zip --title "TradeHubMarkets" --notes "Latest TradeHub Markets release." --latest
          fi
